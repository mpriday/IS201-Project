<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe - Unbeatable AI</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #f4f4f4;
  }
  h1 { margin-bottom: 10px; }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 5px;
  }
  .cell {
    width: 100px;
    height: 100px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    cursor: pointer;
    border: 2px solid #333;
  }
  .cell:hover { background: #eee; }
  #status { margin-top: 15px; }
  button {
    margin-top: 10px;
    padding: 8px 12px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="board"></div>
<div id="status"></div>
<button onclick="resetGame()">Restart</button>

<script>
const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");

let board = Array(9).fill("");
let gameOver = false;

function createBoard() {
  boardEl.innerHTML = "";
  board.forEach((_, i) => {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.addEventListener("click", () => playerMove(i));
    boardEl.appendChild(cell);
  });
}

function playerMove(index) {
  if (board[index] || gameOver) return;
  board[index] = "X";
  render();
  if (checkWinner(board, "X")) {
    statusEl.textContent = "You win! (This shouldn't happen 😅)";
    gameOver = true;
    return;
  }
  if (board.every(c => c)) {
    statusEl.textContent = "Draw!";
    gameOver = true;
    return;
  }
  computerMove();
}

function computerMove() {
  const bestMove = minimax(board, "O").index;
  board[bestMove] = "O";
  render();

  if (checkWinner(board, "O")) {
    statusEl.textContent = "Computer wins!";
    gameOver = true;
    return;
  }
  if (board.every(c => c)) {
    statusEl.textContent = "Draw!";
    gameOver = true;
  }
}

function render() {
  [...boardEl.children].forEach((cell, i) => {
    cell.textContent = board[i];
  });
}

function checkWinner(b, player) {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return wins.some(combo => combo.every(i => b[i] === player));
}

function minimax(newBoard, player) {
  const empty = newBoard
    .map((v, i) => v === "" ? i : null)
    .filter(v => v !== null);

  if (checkWinner(newBoard, "X")) return { score: -10 };
  if (checkWinner(newBoard, "O")) return { score: 10 };
  if (empty.length === 0) return { score: 0 };

  const moves = [];

  for (let i of empty) {
    const move = {};
    move.index = i;
    newBoard[i] = player;

    const result = minimax(newBoard, player === "O" ? "X" : "O");
    move.score = result.score;

    newBoard[i] = "";
    moves.push(move);
  }

  let bestMove;
  if (player === "O") {
    let bestScore = -Infinity;
    moves.forEach((m, i) => {
      if (m.score > bestScore) {
        bestScore = m.score;
        bestMove = i;
      }
    });
  } else {
    let bestScore = Infinity;
    moves.forEach((m, i) => {
      if (m.score < bestScore) {
        bestScore = m.score;
        bestMove = i;
      }
    });
  }

  return moves[bestMove];
}

function resetGame() {
  board = Array(9).fill("");
  gameOver = false;
  statusEl.textContent = "";
  createBoard();
}

createBoard();
</script>

</body>
</html>
